name: PHPUnit

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      pgsql:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: testing
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: PHPセットアップ
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pgsql, pdo_pgsql, mbstring, bcmath, intl, gd
          coverage: none

      - name: Composer依存関係インストール
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Node.jsセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: npm依存関係インストール
        run: npm ci

      - name: フロントエンドビルド
        run: npm run build

      - name: .env作成
        run: cp .env.example .env

      - name: アプリケーションキー生成
        run: php artisan key:generate

      - name: マイグレーション実行
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: testing
          DB_USERNAME: postgres
          DB_PASSWORD: password
        run: php artisan migrate --force

      - name: PHPUnit実行
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: testing
          DB_USERNAME: postgres
          DB_PASSWORD: password
        run: php artisan test
